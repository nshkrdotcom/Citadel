services:
  toxiproxy:
    image: shopify/toxiproxy@sha256:a6b080af39986b863a1f7c5a3b9bacf2afeb48abab8f0eb7e243f8f7ad38c645
    ports:
      - "18474:8474"
      - "18081:18081"
    networks:
      - toxiproxy

  toxiproxy-upstream:
    image: nginx@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    ports:
      - "18080:80"
    volumes:
      - ./upstream/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - toxiproxy

networks:
  toxiproxy:
    name: citadel-toxiproxy
