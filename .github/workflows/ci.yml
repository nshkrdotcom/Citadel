name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions

      - name: Cache Mix artifacts
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.cache/rebar3
          key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', 'mix.lock', '**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Fetch root dependencies
        run: mix deps.get

      - name: Fetch workspace dependencies
        run: mix monorepo.deps.get

      - name: Verify formatting
        run: mix monorepo.format --check-formatted

      - name: Compile workspace
        run: mix monorepo.compile

      - name: Enforce packet seam lint
        run: mix lint.packet_seams

      - name: Run strict workspace lint
        run: mix lint.strict

      - name: Run workspace Dialyzer
        run: mix monorepo.dialyzer

      - name: Run workspace tests
        run: mix monorepo.test
